<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Dungeon master lite</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="Dungeon master lite.icon.png" />
<link rel="apple-touch-icon" href="Dungeon master lite.apple-touch-icon.png"/>
<link rel="manifest" href="Dungeon master lite.manifest.json">

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="Dungeon master lite.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="Dungeon master lite.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"Dungeon master lite","experimentalVK":false,"fileSizes":{"Dungeon master lite.pck":5078980,"Dungeon master lite.wasm":1605674},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"Dungeon master lite.service.worker.js"};
const GODOT_THREADS_ENABLED = true;
// #region agent log
(function agentDbg() {
	function send(msg, data, hypothesisId) {
		fetch("https://dungeon-master-lite.vercel.app/ingest/a2f6d748-df85-4288-afaf-dcecbfdaa24b", {
			method: "POST",
			headers: { "Content-Type": "application/json", "X-Debug-Session-Id": "2caf1b" },
			body: JSON.stringify({
				sessionId: "2caf1b",
				location: "public/demos/dungeon-master-lite/index.html",
				message: msg,
				data: data || {},
				timestamp: Date.now(),
				hypothesisId: hypothesisId || "H0",
			}),
		}).catch(function () {});
	}
	var inIframe = false;
	try {
		inIframe = window.self !== window.top;
	} catch (e) {
		inIframe = true;
	}
	var coi =
		typeof crossOriginIsolated !== "undefined" ? !!crossOriginIsolated : null;
	Promise.all([
		fetch("Dungeon%20master%20lite.wasm", { method: "HEAD" })
			.then(function (r) {
				return { wasmStatus: r.status, wasmOk: r.ok };
			})
			.catch(function (e) {
				return { wasmStatus: "fetch_err", wasmErr: String(e && e.message) };
			}),
		fetch("Dungeon%20master%20lite.pck", { method: "HEAD" })
			.then(function (r) {
				return { pckStatus: r.status, pckOk: r.ok };
			})
			.catch(function (e) {
				return { pckStatus: "fetch_err", pckErr: String(e && e.message) };
			}),
		fetch("Dungeon%20master%20lite.side.wasm", { method: "HEAD" })
			.then(function (r) {
				return { sideWasmStatus: r.status, sideWasmOk: r.ok };
			})
			.catch(function (e) {
				return { sideWasmStatus: "fetch_err", sideWasmErr: String(e && e.message) };
			}),
	]).then(function (parts) {
		var merged = {};
		parts.forEach(function (p) {
			Object.assign(merged, p);
		});
		send(
			"godot_bootstrap_probe",
			Object.assign(
				{
					crossOriginIsolated: coi,
					inIframe: inIframe,
					href: String(location.href || ""),
				},
				merged,
			),
			"H1",
		);
	});
	window.__agentGodotDbg = send;
})();
// #endregion
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		// #region agent log
		if (typeof window.__agentGodotDbg === "function") {
			var msg =
				err instanceof Error
					? err.message
					: typeof err === "string"
						? err
						: "non_error_failure";
			window.__agentGodotDbg(
				"godot_display_failure",
				{ failureMessage: String(msg).slice(0, 500) },
				"H4",
			);
		}
		// #endregion
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});
	// #region agent log
	if (typeof window.__agentGodotDbg === "function") {
		window.__agentGodotDbg(
			"godot_missing_features",
			{ missingCount: missing.length, missing: missing.slice() },
			"H2",
		);
	}
	// #endregion

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
